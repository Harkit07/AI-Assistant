services:
  backend:
    build: ./Backend
    ports:
      - "8080:8080"
    environment:
      # - MONGODB_URI=mongodb+srv://AI-Assistant:NEW_PASSWORD@ai-assistant.wqpwoge.mongodb.net/?appName=AI-Assistant
      - OPENAI_API_KEY=your_new_nvidia_key
      - MONGO_URI=mongodb://mongo:27017/ChatGPT
      # - MONGO_URL=mongodb://mongo:27017/ChatGPT
      - JWT_SECRET=your_new_jwt_secret
      - NODE_ENV=production
      - CLIENT_URL=https://ai-assistant-nsg8.onrender.com
    depends_on:
      - mongo

  frontend:
    build: ./Frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
