name: Docker Credential Tester

on:
  workflow_dispatch:

jobs:
  test-credentials:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Verify Docker Login Status
        run: |
          docker info | grep Username
          echo "Docker login successful. Proceeding to test push permissions."

      - name: Build a Dummy Image
        run: |
          echo "FROM alpine" > Dockerfile
          docker build -t ${{ secrets.DOCKER_USERNAME }}/dummy-image:latest .

      - name: Push Dummy Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/dummy-image:latest
          echo "Dummy image pushed successfully. Your PAT has sufficient scopes."

      - name: Clean up Dummy Image (Optional)
        if: always()
        run: |
          docker rmi ${{ secrets.DOCKER_USERNAME }}/dummy-image:latest || true
          rm Dockerfile
