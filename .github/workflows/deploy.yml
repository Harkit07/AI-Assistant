name: Debug Repository Structure

on:
  push:
    branches:
      - main

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: List all files and folders
        run: |
          echo "=== Current directory ==="
          pwd
          echo ""
          echo "=== Root contents ==="
          ls -la
          echo ""
          echo "=== Looking for 'Backend' (case-sensitive) ==="
          if [ -d "Backend" ]; then
            echo "✅ Found 'Backend' directory"
            ls -la Backend/
            if [ -f "Backend/Dockerfile" ]; then
              echo "✅ Backend/Dockerfile exists"
            else
              echo "❌ Backend/Dockerfile MISSING"
            fi
          elif [ -d "backend" ]; then
            echo "⚠️ Found 'backend' (lowercase) – your workflow uses 'Backend'"
            ls -la backend/
          else
            echo "❌ No 'Backend' or 'backend' directory found"
          fi
          echo ""
          echo "=== Looking for 'Frontend' ==="
          if [ -d "Frontend" ]; then
            echo "✅ Found 'Frontend' directory"
            ls -la Frontend/
            if [ -f "Frontend/Dockerfile" ]; then
              echo "✅ Frontend/Dockerfile exists"
            else
              echo "❌ Frontend/Dockerfile MISSING"
            fi
          elif [ -d "frontend" ]; then
            echo "⚠️ Found 'frontend' (lowercase)"
          else
            echo "❌ No 'Frontend' or 'frontend' directory found"
          fi
