name: AI Assistant CI/CD (Debug)

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Backend Directory Exists
        run: |
          if [ ! -d "./Backend" ]; then
            echo "Error: Backend directory not found!" >&2
            exit 1
          fi

      - name: Verify Frontend Directory Exists
        run: |
          if [ ! -d "./Frontend" ]; then
            echo "Error: Frontend directory not found!" >&2
            exit 1
          fi

      - name: Login To Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest ./Backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest ./Frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest
