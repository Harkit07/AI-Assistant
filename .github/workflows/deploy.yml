name: AI Assistant CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4 # Updated to v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }} # Ensure this is a PAT from Docker Hub

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest ./Backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest ./Frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest

      - name: Check secrets exist
        run: |
          [ -n "${{ secrets.DOCKER_USERNAME }}" ] && echo "Username OK" || echo "Username missing"
          [ -n "${{ secrets.DOCKER_PASSWORD }}" ] && echo "Password OK" || echo "Password missing"
