name: AI Assistant CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: DEBUG - List all files in runner
        run: |
          echo "Current directory: $(pwd)"
          echo "Root folder contents:"
          ls -la
          echo ""
          echo "Looking for Backend folder:"
          if [ -d "./Backend" ]; then
            echo "✅ Backend folder exists. Contents:"
            ls -la ./Backend
            if [ -f "./Backend/Dockerfile" ]; then
              echo "✅ Dockerfile found in Backend"
            else
              echo "❌ Dockerfile NOT found in Backend"
              exit 1
            fi
          else
            echo "❌ Backend folder does NOT exist!"
            echo "Available folders in root:"
            ls -d */
            exit 1
          fi
          echo ""
          echo "Looking for Frontend folder:"
          if [ -d "./Frontend" ]; then
            echo "✅ Frontend folder exists. Contents:"
            ls -la ./Frontend
            if [ -f "./Frontend/Dockerfile" ]; then
              echo "✅ Dockerfile found in Frontend"
            else
              echo "❌ Dockerfile NOT found in Frontend"
              exit 1
            fi
          else
            echo "❌ Frontend folder does NOT exist!"
            exit 1
          fi

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Backend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest ./Backend

      - name: Build Frontend Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest ./Frontend

      - name: Push Backend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-backend:latest

      - name: Push Frontend Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/ai-assistant-frontend:latest
